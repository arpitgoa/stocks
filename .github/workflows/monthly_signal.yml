name: Monthly Momentum Signal

on:
  schedule:
    - cron: '0 19 * * 5'       # Every Friday at 12 PM PST (7 PM UTC) — 1hr before market close
    - cron: '0 19 27-31 * *'   # Last 5 days of month at 12 PM PST (7 PM UTC)
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate-signal:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Check if today is a trading day
        id: check_trading_day
        if: github.event_name == 'schedule'
        run: |
          python -c "
          from datetime import datetime
          today = datetime.now()
          # Skip weekends (Sat=5, Sun=6)
          if today.weekday() >= 5:
              print('Not a trading day (weekend)')
              exit(1)
          print(f'✅ Trading day ({today.strftime(\"%A %Y-%m-%d\")}) — running signal')
          "
      
      - name: Install dependencies
        run: |
          pip install -r github_action/requirements.txt
      
      - name: Run pipeline
        working-directory: github_action
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          python run_pipeline.py
      
      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github_action/data/ || true
          git diff --staged --quiet || git commit -m "chore: update prices and constituents [skip ci]"
          git push || true
